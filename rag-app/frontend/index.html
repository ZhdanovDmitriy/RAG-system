<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Помощник</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      padding: 20px;
      line-height: 1.5;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 {
      margin-bottom: 20px;
      color: #1a1a2e;
      font-size: 1.5rem;
      text-align: center;
    }
    .form-group { margin-bottom: 16px; }
    
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #333;
    }
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      min-height: 120px;
      resize: vertical;
      transition: border-color 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .hint {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 4px;
      text-align: right;
    }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .answer-box {
      margin-top: 24px;
      padding: 16px;
      background: #f9fafb;
      border-left: 4px solid #4f46e5;
      border-radius: 0 8px 8px 0;
      display: none;
    }
    .answer-box.visible { display: block; }
    .answer-label {
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    .answer-text {
      white-space: pre-wrap;
      color: #374151;
    }
    .error {
      color: #dc2626;
      background: #fef2f2;
      padding: 10px 12px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
    }
    .error.visible { display: block; }
    .loading {
      text-align: center;
      color: #6b7280;
      margin-top: 12px;
      display: none;
    }
    .loading.visible { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Я готов ответить на ваш вопрос!</h1>
    
    <form id="questionForm">
      <div class="form-group">
        <label for="question">Ваш вопрос *</label>
        <textarea 
          id="question" 
          name="question" 
          required 
          minlength="1" 
          maxlength="1000"
          placeholder="Напишите ваш вопрос здесь..."></textarea>
        <div class="hint"><span id="charCount">0</span>/1000</div>
      </div>
      <button type="submit" id="submitBtn">Отправить</button>
    </form>

    <div class="loading" id="loading">⏳ Думаю...</div>
    <div class="error" id="error"></div>

    <div class="answer-box" id="answerBox">
      <div class="answer-label">💡 Ответ:</div>
      <div class="answer-text" id="answerText"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('questionForm');
    const questionInput = document.getElementById('question');
    const charCount = document.getElementById('charCount');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const errorBox = document.getElementById('error');
    const answerBox = document.getElementById('answerBox');
    const answerText = document.getElementById('answerText');

    questionInput.addEventListener('input', () => {
      charCount.textContent = questionInput.value.length;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      errorBox.classList.remove('visible');
      answerBox.classList.remove('visible');
      loading.classList.add('visible');
      submitBtn.disabled = true;

      const payload = {
        question: questionInput.value.trim()
      };

      try {
        const response = await fetch('/api/question', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.detail || `Ошибка ${response.status}`);
        }

        const data = await response.json();
        const parts = [];
        if (data.short?.length) parts.push('Кратко:\n' + data.short.join('\n'));
        if (data.long?.length) parts.push('Подробнее:\n' + data.long.join('\n'));
        answerText.textContent = parts.join('\n\n') || 'Нет ответа';
        answerBox.classList.add('visible');
        questionInput.value = '';
        charCount.textContent = '0';

      } catch (err) {
        errorBox.textContent = `❌ ${err.message}`;
        errorBox.classList.add('visible');
        console.error('Request failed:', err);
      } finally {
        loading.classList.remove('visible');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
